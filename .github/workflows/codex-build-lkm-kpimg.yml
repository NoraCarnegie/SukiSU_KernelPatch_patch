name: Codex Build LKM kpimg

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y make gcc g++ xz-utils

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: true

      - name: Build Android kpimg
        run: |
          export TARGET_COMPILE="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export ANDROID=1
          cd kernel
          make clean
          make -j"$(nproc)"
          cp kpimg ../kpimg-android-lkm
          cp kpimg.elf ../kpimg.elf-android-lkm

      - name: Upload kpimg
        uses: actions/upload-artifact@v4
        with:
          name: kpimg-android-lkm
          path: |
            kpimg-android-lkm
            kpimg.elf-android-lkm
